<svg
  class="thread-svg"
  viewBox="0 0 390 844"
  preserveAspectRatio="xMidYMid slice"
  aria-hidden="true"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter id="threadGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Hilo izquierdo -->
  <path
    id="leftThread"
    class="thread-path"
    d="
      M 195 250
      C 178 208, 112 206, 98 263
      C 82 330, 142 373, 195 413
    "
  />

  <!-- Hilo derecho -->
  <path
    id="rightThread"
    class="thread-path"
    d="
      M 195 250
      C 212 208, 278 206, 292 263
      C 308 330, 248 373, 195 413
    "
  />

  <!-- Punto luminoso izquierdo -->
  <circle
    id="leftHead"
    class="thread-head"
    r="5"
    cx="195"
    cy="250"
  />

  <!-- Punto luminoso derecho -->
  <circle
    id="rightHead"
    class="thread-head"
    r="5"
    cx="195"
    cy="250"
  />

  <!-- Luz central inferior -->
  <circle
    id="centerGlow"
    class="center-glow"
    r="7"
    cx="195"
    cy="413"
  />

  <!-- Chispas decorativas -->
  <circle class="spark spark-1" cx="58" cy="150" r="1.4" />
  <circle class="spark spark-2" cx="320" cy="190" r="1.3" />
  <circle class="spark spark-3" cx="85" cy="620" r="1.3" />
  <circle class="spark spark-4" cx="315" cy="610" r="1.5" />
  <circle class="spark spark-5" cx="210" cy="210" r="1.2" />
</svg>